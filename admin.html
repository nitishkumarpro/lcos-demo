<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – LCOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="state.js"></script>
  <style>
    .sidebar-item { border-left: 3px solid transparent; }
    .sidebar-item.active, .sidebar-item:hover { background: #eff6ff; border-left-color: #3b82f6; }
  </style>
</head>
<body class="h-screen flex">
  <aside class="w-60 bg-slate-50 border-r p-3 space-y-1 text-sm overflow-y-auto">
    <div class="font-bold text-rose-600 mb-4 px-2"><i class="fa-solid fa-building-columns"></i> Admin</div>
    <div onclick="switchAdminTab('exec')" class="sidebar-item px-3 py-2 rounded cursor-pointer active" data-atab="exec">📈 Executive</div>
    <div onclick="switchAdminTab('customers')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-atab="customers">👥 Customers</div>
    <div onclick="switchAdminTab('vendors')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-atab="vendors">🏪 Vendors</div>
    <div onclick="switchAdminTab('riders')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-atab="riders">🛵 Riders</div>
    <div onclick="switchAdminTab('catalog')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-atab="catalog">📚 Catalog</div>
    <div onclick="switchAdminTab('orders')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-atab="orders">📦 Orders</div>
    <!-- ... more tabs ... -->
  </aside>
  <main class="flex-1 p-5 overflow-y-auto" id="adminContent"></main>

  <script>
    function switchAdminTab(tab) {
      document.getElementById('adminContent').innerHTML = renderAdminTab(tab);
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`.sidebar-item[data-atab="${tab}"]`).classList.add('active');
    }
    function renderAdminTab(tab) {
      if (tab === 'exec') return `
        <div class="grid grid-cols-4 gap-4 mb-5">
          <div class="card p-4"><p class="text-slate-500">Total Orders</p><p class="text-2xl font-bold" id="aOrders">0</p></div>
          <div class="card p-4"><p class="text-slate-500">Revenue</p><p class="text-2xl font-bold" id="aRevenue">₹0</p></div>
          <div class="card p-4"><p class="text-slate-500">Live Orders</p><p class="text-2xl font-bold" id="aLive">0</p></div>
        </div>
        <h4 class="font-semibold mb-2">Activity Feed</h4>
        <div id="adminFeed" class="space-y-1 text-sm"></div>
      `;
      return `<div class="card p-6 text-center text-slate-500">${tab} module (simulated)</div>`;
    }
    window.onStateUpdate = function(s) {
      document.getElementById('aOrders') && (document.getElementById('aOrders').innerText = s.stats.totalOrders);
      document.getElementById('aRevenue') && (document.getElementById('aRevenue').innerText = '₹' + s.stats.revenue);
      document.getElementById('aLive') && (document.getElementById('aLive').innerText = s.stats.liveOrders);
      const feed = document.getElementById('adminFeed');
      if (feed) feed.innerHTML = s.orders.slice(-5).reverse().map(o => `<div class="flex justify-between"><span>${o.product} #${o.id}</span><span class="text-xs ${o.status==='delivered'?'text-green-600':'text-blue-600'}">${o.status}</span></div>`).join('');
    };
    switchAdminTab('exec');
    onStateUpdate(state);
  </script>
</body>
</html>
