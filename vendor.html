<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor – LCOS</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="state.js"></script>
</head>
<body class="h-screen flex">
  <aside class="w-56 bg-slate-50 border-r p-3 space-y-1 text-sm overflow-y-auto">
    <div class="font-bold text-amber-600 mb-4 px-2"><i class="fa-solid fa-store"></i> Vendor Panel</div>
    <div onclick="switchTab('dashboard')" class="sidebar-item px-3 py-2 rounded cursor-pointer active" data-vtab="dashboard">📊 Dashboard</div>
    <div onclick="switchTab('orders')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-vtab="orders">📦 Orders</div>
    <div onclick="switchTab('inventory')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-vtab="inventory">📋 Inventory</div>
    <div onclick="switchTab('products')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-vtab="products">🏷️ Products</div>
    <div onclick="switchTab('promotions')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-vtab="promotions">🎟️ Promotions</div>
    <div onclick="switchTab('analytics')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-vtab="analytics">📈 Analytics</div>
    <div onclick="switchTab('finance')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-vtab="finance">💰 Finance</div>
    <div onclick="switchTab('team')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-vtab="team">👥 Team</div>
    <div onclick="switchTab('marketing')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-vtab="marketing">📣 Marketing</div>
    <div onclick="switchTab('reviews')" class="sidebar-item px-3 py-2 rounded cursor-pointer" data-vtab="reviews">⭐ Reviews</div>
  </aside>
  <main class="flex-1 p-5 overflow-y-auto" id="vendorContent"></main>

  <script>
    const tabs = ['dashboard','orders','inventory','products','promotions','analytics','finance','team','marketing','reviews'];

    function switchTab(tab) {
      document.getElementById('vendorContent').innerHTML = renderTab(tab);
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`.sidebar-item[data-vtab="${tab}"]`).classList.add('active');
    }

    function renderTab(tab) {
      switch(tab) {
        case 'dashboard':
          return `
            <div class="grid grid-cols-3 gap-4 mb-5">
              <div class="card p-4"><p class="text-slate-500">Today Orders</p><p class="text-2xl font-bold" id="vOrders">0</p></div>
              <div class="card p-4"><p class="text-slate-500">Revenue</p><p class="text-2xl font-bold" id="vRevenue">₹0</p></div>
              <div class="card p-4"><p class="text-slate-500">Live Orders</p><span class="pulse-dot inline-block w-3 h-3 bg-emerald-500 rounded-full"></span></div>
            </div>
            <h4 class="font-semibold mb-2">Recent Orders</h4>
            <div id="vendorOrderList" class="space-y-2"></div>
          `;
        case 'orders':
          return `<h4 class="font-semibold mb-2">All Orders</h4><div id="vendorOrderList" class="space-y-2"></div>`;
        case 'inventory':
          return `
            <h4 class="font-semibold mb-2">Stock Levels</h4>
            <div class="space-y-2" id="invList"></div>
          `;
        case 'products':
          return `
            <h4 class="font-semibold mb-2">Product Catalog</h4>
            <div class="card p-3 flex justify-between mb-2"><span>Amul Gold Milk</span><span class="badge badge-blue">₹65</span></div>
            <div class="card p-3 flex justify-between mb-2"><span>Brown Bread</span><span class="badge badge-blue">₹45</span></div>
          `;
        case 'promotions':
          return `<div class="card p-4">🎟️ 10% off on milk – active</div>`;
        case 'analytics':
          return `<div class="card p-4">📊 Sales chart (simulated)</div>`;
        case 'finance':
          return `<div class="card p-4">💰 Settlements, GST, Invoices (simulated)</div>`;
        case 'team':
          return `<div class="card p-4">👥 Employees & roles (simulated)</div>`;
        case 'marketing':
          return `<div class="card p-4">📣 Push campaigns (simulated)</div>`;
        case 'reviews':
          return `<div class="card p-4">⭐ Customer reviews (simulated)</div>`;
        default: return '';
      }
    }

    window.updateUI = function(s) {
      // Orders list
      const ordersContainer = document.getElementById('vendorOrderList');
      if (ordersContainer) {
        ordersContainer.innerHTML = s.orders.slice(-5).reverse().map(o => `
          <div class="card p-3 flex justify-between">
            <span>${o.product} <span class="text-xs text-slate-500">#${o.id}</span></span>
            <span class="badge ${o.status==='placed'?'badge-amber':'badge-blue'}">${o.status}</span>
          </div>`).join('');
      }
      // Stats
      document.getElementById('vOrders') && (document.getElementById('vOrders').innerText = s.orders.length);
      document.getElementById('vRevenue') && (document.getElementById('vRevenue').innerText = '₹' + s.orders.reduce((sum,o)=>sum+o.price,0));
      // Inventory
      const invDiv = document.getElementById('invList');
      if (invDiv) {
        invDiv.innerHTML = Object.entries(s.inventory).map(([item, qty]) => `
          <div class="card p-3 flex justify-between"><span>${item}</span><span class="badge ${qty<20?'badge-rose':'badge-green'}">${qty} units</span></div>
        `).join('');
      }
    };

    switchTab('dashboard');
    updateUI(state);
  </script>
</body>
</html>
