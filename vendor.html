<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏪 Vendor Panel – LCOS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="state.js"></script>
    <style>
        .vendor-body { display: flex; height: 100vh; }
        .sidebar { width: 240px; background: white; border-right: 1px solid #e2e8f0; overflow-y: auto; }
        .main-content { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .stat-card { background: white; border-radius: 1rem; padding: 1.25rem; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="vendor-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="p-4 border-b">
            <h2 class="font-bold text-amber-600 text-lg"><i class="fa-solid fa-store"></i> Vendor Panel</h2>
            <p class="text-xs text-slate-500">QuickMart Store</p>
        </div>
        <nav class="p-2 space-y-1">
            <div onclick="switchVendorTab('dashboard')" class="sidebar-item active" data-vtab="dashboard">
                <i class="fa-solid fa-chart-pie sidebar-icon"></i> Dashboard
            </div>
            <div onclick="switchVendorTab('orders')" class="sidebar-item" data-vtab="orders">
                <i class="fa-solid fa-receipt sidebar-icon"></i> Orders
            </div>
            <div onclick="switchVendorTab('inventory')" class="sidebar-item" data-vtab="inventory">
                <i class="fa-solid fa-boxes-stacked sidebar-icon"></i> Inventory
            </div>
            <div onclick="switchVendorTab('products')" class="sidebar-item" data-vtab="products">
                <i class="fa-solid fa-tag sidebar-icon"></i> Products
            </div>
            <div onclick="switchVendorTab('promotions')" class="sidebar-item" data-vtab="promotions">
                <i class="fa-solid fa-percent sidebar-icon"></i> Promotions
            </div>
            <div onclick="switchVendorTab('analytics')" class="sidebar-item" data-vtab="analytics">
                <i class="fa-solid fa-chart-line sidebar-icon"></i> Analytics
            </div>
            <div onclick="switchVendorTab('finance')" class="sidebar-item" data-vtab="finance">
                <i class="fa-solid fa-indian-rupee-sign sidebar-icon"></i> Finance
            </div>
            <div onclick="switchVendorTab('team')" class="sidebar-item" data-vtab="team">
                <i class="fa-solid fa-users sidebar-icon"></i> Team
            </div>
            <div onclick="switchVendorTab('marketing')" class="sidebar-item" data-vtab="marketing">
                <i class="fa-solid fa-bullhorn sidebar-icon"></i> Marketing
            </div>
            <div onclick="switchVendorTab('reviews')" class="sidebar-item" data-vtab="reviews">
                <i class="fa-solid fa-star sidebar-icon"></i> Reviews
            </div>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="vendorContent">
        <!-- Content rendered by JS -->
    </main>

    <script>
        // Track current tab
        let currentTab = 'dashboard';

        function switchVendorTab(tab) {
            currentTab = tab;
            renderTab(tab);
            // Update sidebar active state
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.querySelector(`.sidebar-item[data-vtab="${tab}"]`);
            if (activeItem) activeItem.classList.add('active');
        }

        function renderTab(tab) {
            const container = document.getElementById('vendorContent');
            switch (tab) {
                case 'dashboard': container.innerHTML = renderDashboard(); break;
                case 'orders': container.innerHTML = renderOrders(); break;
                case 'inventory': container.innerHTML = renderInventory(); break;
                case 'products': container.innerHTML = renderProducts(); break;
                case 'promotions': container.innerHTML = renderPromotions(); break;
                case 'analytics': container.innerHTML = renderAnalytics(); break;
                case 'finance': container.innerHTML = renderFinance(); break;
                case 'team': container.innerHTML = renderTeam(); break;
                case 'marketing': container.innerHTML = renderMarketing(); break;
                case 'reviews': container.innerHTML = renderReviews(); break;
            }
            // Re-apply updateUI for live data
            updateUI(window.state);
        }

        function renderDashboard() {
            return `
                <h3 class="text-xl font-bold mb-4">Dashboard</h3>
                <div class="grid grid-cols-4 gap-4 mb-6">
                    <div class="stat-card">
                        <p class="text-slate-500 text-sm">Today's Orders</p>
                        <p class="text-2xl font-bold" id="vOrders">0</p>
                    </div>
                    <div class="stat-card">
                        <p class="text-slate-500 text-sm">Revenue</p>
                        <p class="text-2xl font-bold" id="vRevenue">₹0</p>
                    </div>
                    <div class="stat-card">
                        <p class="text-slate-500 text-sm">Live Orders</p>
                        <div class="flex items-center gap-2">
                            <span class="pulse-dot inline-block w-3 h-3 bg-emerald-500 rounded-full"></span>
                            <span id="vLive">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <p class="text-slate-500 text-sm">Inventory Items</p>
                        <p class="text-2xl font-bold" id="vInventoryCount">${Object.keys(window.state.inventory).length}</p>
                    </div>
                </div>
                <h4 class="font-semibold mb-2">Recent Orders</h4>
                <div id="vendorOrderList" class="space-y-2"></div>
            `;
        }

        function renderOrders() {
            return `
                <h3 class="text-xl font-bold mb-4">All Orders</h3>
                <div id="vendorOrderList" class="space-y-2"></div>
            `;
        }

        function renderInventory() {
            return `
                <h3 class="text-xl font-bold mb-4">Inventory</h3>
                <div class="grid grid-cols-2 gap-3" id="invGrid"></div>
            `;
        }

        function renderProducts() {
            return `
                <h3 class="text-xl font-bold mb-4">Product Catalog</h3>
                <div class="card p-4 mb-3 flex justify-between items-center">
                    <div>
                        <p class="font-medium">Amul Gold Milk</p>
                        <p class="text-sm text-slate-500">₹65 · 500 ml</p>
                    </div>
                    <span class="badge badge-blue">Active</span>
                </div>
                <div class="card p-4 mb-3 flex justify-between items-center">
                    <div>
                        <p class="font-medium">Brown Bread</p>
                        <p class="text-sm text-slate-500">₹45 · 400g</p>
                    </div>
                    <span class="badge badge-blue">Active</span>
                </div>
                <div class="card p-4 mb-3 flex justify-between items-center">
                    <div>
                        <p class="font-medium">Organic Eggs</p>
                        <p class="text-sm text-slate-500">₹80 · 6 pcs</p>
                    </div>
                    <span class="badge badge-blue">Active</span>
                </div>
                <button class="btn btn-outline btn-sm mt-2"><i class="fa-solid fa-plus"></i> Add Product (simulated)</button>
            `;
        }

        function renderPromotions() {
            return `
                <h3 class="text-xl font-bold mb-4">Promotions</h3>
                <div class="card p-4 mb-3">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-medium">🎟️ 10% off on Milk</p>
                            <p class="text-sm text-slate-500">Coupon: SAVE10</p>
                        </div>
                        <span class="badge badge-green">Active</span>
                    </div>
                </div>
                <div class="card p-4">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-medium">🎁 Buy 1 Get 1 Free – Bread</p>
                            <p class="text-sm text-slate-500">Limited time</p>
                        </div>
                        <span class="badge badge-amber">Scheduled</span>
                    </div>
                </div>
            `;
        }

        function renderAnalytics() {
            return `
                <h3 class="text-xl font-bold mb-4">Analytics</h3>
                <div class="card p-6 text-center">
                    <i class="fa-solid fa-chart-bar text-4xl text-slate-300 mb-3 block"></i>
                    <p class="text-slate-500">Sales chart (simulated)</p>
                    <p class="text-sm text-slate-400 mt-2">Revenue, orders, and customer trends</p>
                </div>
            `;
        }

        function renderFinance() {
            return `
                <h3 class="text-xl font-bold mb-4">Finance</h3>
                <div class="card p-4 mb-3">
                    <p class="font-medium">Settlements</p>
                    <p class="text-sm text-slate-500">Next payout: ₹12,500 (in 2 days)</p>
                </div>
                <div class="card p-4 mb-3">
                    <p class="font-medium">GST & Taxes</p>
                    <p class="text-sm text-slate-500">Simulated tax reports</p>
                </div>
            `;
        }

        function renderTeam() {
            return `
                <h3 class="text-xl font-bold mb-4">Team</h3>
                <div class="card p-4 mb-2 flex justify-between">
                    <span>👤 Rajesh Kumar (Owner)</span><span class="badge badge-purple">Admin</span>
                </div>
                <div class="card p-4 mb-2 flex justify-between">
                    <span>👤 Priya Singh (Staff)</span><span class="badge badge-blue">Packer</span>
                </div>
            `;
        }

        function renderMarketing() {
            return `
                <h3 class="text-xl font-bold mb-4">Marketing</h3>
                <div class="card p-4 mb-3">
                    <p class="font-medium">📢 Push Campaign</p>
                    <p class="text-sm text-slate-500">Sent: "Flash Sale Live!" – 1200 impressions</p>
                </div>
                <div class="card p-4">
                    <p class="font-medium">📧 Email Campaign</p>
                    <p class="text-sm text-slate-500">Sent: Weekly offers – 45% open rate</p>
                </div>
            `;
        }

        function renderReviews() {
            return `
                <h3 class="text-xl font-bold mb-4">Customer Reviews</h3>
                <div class="card p-4 mb-2">
                    <div class="flex justify-between">
                        <span>⭐ 4.8</span><span class="text-sm text-slate-500">12 reviews</span>
                    </div>
                </div>
                <div class="card p-4 mb-2">
                    <p class="font-medium">Amul Gold Milk</p>
                    <p class="text-sm">"Great quality!" - Ramesh</p>
                </div>
            `;
        }

        // Update UI with shared state
        window.updateUI = function(s) {
            // Update Dashboard stats if visible
            if (currentTab === 'dashboard' || currentTab === 'orders') {
                const ordersEl = document.getElementById('vendorOrderList');
                if (ordersEl) {
                    ordersEl.innerHTML = s.vendorOrders.length === 0
                        ? '<p class="text-slate-400 text-center py-4">No orders yet.</p>'
                        : s.vendorOrders.slice(-10).reverse().map(o => `
                            <div class="card p-3 flex justify-between items-center">
                                <div>
                                    <p class="font-medium">${o.product}</p>
                                    <p class="text-xs text-slate-500">#${o.id} · ${o.time}</p>
                                </div>
                                <span class="badge ${o.status==='placed'?'badge-amber':o.status==='delivered'?'badge-green':'badge-blue'}">${o.status}</span>
                            </div>
                        `).join('');
                }

                document.getElementById('vOrders') && (document.getElementById('vOrders').innerText = s.vendorOrders.length);
                document.getElementById('vRevenue') && (document.getElementById('vRevenue').innerText = '₹' + s.vendorOrders.reduce((sum,o)=>sum+o.price,0));
                document.getElementById('vLive') && (document.getElementById('vLive').innerText = s.stats.liveOrders);
            }

            // Inventory tab
            if (currentTab === 'inventory') {
                const invGrid = document.getElementById('invGrid');
                if (invGrid) {
                    invGrid.innerHTML = Object.entries(s.inventory).map(([item, qty]) => `
                        <div class="card p-3 flex justify-between items-center">
                            <span>${item}</span>
                            <span class="badge ${qty<20?'badge-rose':'badge-green'}">${qty} units</span>
                        </div>
                    `).join('');
                }
            }
        };

        // Initial load
        switchVendorTab('dashboard');
        updateUI(window.state);
    </script>
</body>
</html>
