<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rider – LCOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="state.js"></script>
</head>
<body class="h-screen flex flex-col bg-white">
  <header class="bg-white border-b px-4 py-3 flex justify-between items-center shadow-sm">
    <span class="font-bold text-emerald-600"><i class="fa-solid fa-motorcycle"></i> Rider</span>
    <label class="flex items-center gap-2 text-sm"><span>Online</span><input type="checkbox" checked class="accent-emerald-500"></label>
  </header>
  <main class="flex-1 p-4 overflow-y-auto">
    <div class="card p-4 mb-4 text-center">
      <p class="text-slate-500">Today Earnings</p>
      <p class="text-2xl font-bold">₹450</p>
    </div>
    <div id="riderOrderPopup" class="card p-4 hidden border-emerald-300 bg-emerald-50">
      <p class="font-bold text-emerald-700">🔔 New Pickup Request</p>
      <p id="riderOrderDetails" class="text-sm mt-1"></p>
      <button onclick="acceptDelivery()" class="mt-3 w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700">Accept Delivery</button>
    </div>
    <div class="mt-4 text-sm text-slate-500">Performance, Earnings, Wallet tabs simulated</div>
  </main>

  <script>
    window.onStateUpdate = function(s) {
      const popup = document.getElementById('riderOrderPopup');
      if (s.riderAssigned) {
        popup.classList.remove('hidden');
        document.getElementById('riderOrderDetails').innerText = `Order #${s.riderAssigned} - Pickup ready`;
      } else {
        popup.classList.add('hidden');
      }
    };

    function acceptDelivery() {
      if (state.riderAssigned && state.currentOrderId) {
        advanceOrder('delivered');
        state.riderAssigned = null;
        state.stats.liveOrders = Math.max(0, state.stats.liveOrders - 1);
        broadcast();
      }
    }
  </script>
</body>
</html>
