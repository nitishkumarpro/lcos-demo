<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCOS – Demo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-screen flex items-center justify-center">
  <div class="bg-white p-10 rounded-3xl shadow-xl text-center max-w-md w-full">
    <h1 class="text-4xl font-extrabold text-blue-600 mb-2">⚡ Local Commerce OS</h1>
    <p class="text-slate-500 mb-8">Open each role in a separate tab</p>
    <div class="grid grid-cols-2 gap-4">
      <a href="customer.html" class="p-5 rounded-2xl bg-blue-50 hover:bg-blue-100 border border-blue-200 transition block">
        <i class="fa-solid fa-user text-2xl text-blue-600 mb-2"></i> Customer
      </a>
      <a href="vendor.html" class="p-5 rounded-2xl bg-amber-50 hover:bg-amber-100 border border-amber-200 transition block">
        <i class="fa-solid fa-store text-2xl text-amber-600 mb-2"></i> Vendor
      </a>
      <a href="rider.html" class="p-5 rounded-2xl bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 transition block">
        <i class="fa-solid fa-motorcycle text-2xl text-emerald-600 mb-2"></i> Rider
      </a>
      <a href="admin.html" class="p-5 rounded-2xl bg-rose-50 hover:bg-rose-100 border border-rose-200 transition block">
        <i class="fa-solid fa-chart-line text-2xl text-rose-600 mb-2"></i> Admin
      </a>
    </div>
  </div>
</body>
</html>
